<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation Display</title>
    <style>
        body {
            overflow: hidden;
        }
        #drawing {
            position: absolute;
        }
    </style>
</head>
<body>
    <canvas id="drawing"></canvas>
    <script>
        // Assuming drawing data is passed through a query parameter
        const params = new URLSearchParams(window.location.search);
        const drawingData = params.get('drawing');

        // Function to draw the received drawing data on the canvas
        function drawCanvas(data) {
            const canvas = document.getElementById('drawing');
            const ctx = canvas.getContext('2d');
            // Interpret the drawingData and render it
            // ... Fill in with actual drawing logic ...

            // Example: drawing a simple circle (replace with actual drawing logic)
            ctx.beginPath();
            ctx.arc(50, 50, 20, 0, Math.PI * 2);
            ctx.fillStyle = 'red';
            ctx.fill();
        }

        // Animate drawing across the screen
        function animate() {
            const canvas = document.getElementById('drawing');
            let position = 0; // Start position
            const id = setInterval(frame, 10);

            function frame() {
                if (position >= window.innerWidth) {
                    clearInterval(id);
                } else {
                    position++;
                    canvas.style.left = position + 'px'; // Move the canvas
                }
            }
        }

        window.onload = function() {
            drawCanvas(drawingData);
            animate();
        };
    </script>
</body>
</html>
