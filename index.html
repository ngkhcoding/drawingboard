<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🏫 SWCSSS 智啟展示廳</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; overscroll-behavior: none; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        canvas { touch-action: none; }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* --- 聚光燈特效 (已減輕) --- */
        #zooContainer::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.25); 
            backdrop-filter: blur(3px); 
            -webkit-backdrop-filter: blur(3px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 1.5s ease;
            z-index: 90;
        }
        #zooContainer.zoo-spotlight-active::before { opacity: 1; }

        /* --- 角色容器 --- */
        .moving-wrapper {
            position: absolute;
            width: 140px; height: 140px;
            cursor: pointer;
            z-index: 5;
            transition: filter 0.3s, opacity 0.3s, transform 0.3s;
        }
        .sprite {
            width: 100%; height: 100%;
            object-fit: contain;
            --facing: 1;
            transform: scaleX(var(--facing));
            transition: transform 0.3s ease;
        }
        .facing-left { --facing: -1; }
        .facing-right { --facing: 1; }

        /* --- 動畫狀態 --- */
        .anim-walk { animation: walkCycle 1.2s infinite alternate ease-in-out; }
        @keyframes walkCycle {
            0% { transform: scaleX(var(--facing)) translateY(0px) rotate(0deg); }
            100% { transform: scaleX(var(--facing)) translateY(-6px) rotate(-5deg); }
        }

        /* --- 碰撞打招呼泡泡 --- */
        .greeting-bubble {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            border: 2px solid #10b981;
            color: #059669;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 800;
            opacity: 0;
            pointer-events: none;
            white-space: nowrap;
            z-index: 20;
            animation: popFade 2.5s forwards;
        }
        @keyframes popFade {
            0% { opacity: 0; transform: translate(-50%, 10px) scale(0.8); }
            10% { opacity: 1; transform: translate(-50%, 0) scale(1); }
            90% { opacity: 1; transform: translate(-50%, 0) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -10px) scale(0.8); }
        }

        .spotlight-entity {
            transform: scale(2.2) !important;
            z-index: 100 !important;
            filter: drop-shadow(0 0 45px rgba(255, 255, 255, 0.9)) !important;
            transition: transform 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 1.5s !important;
        }

        .magic-spinner {
            width: 60px; height: 60px;
            border: 6px solid rgba(255,255,255,0.3);
            border-top-color: #fff; border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 h-screen w-screen overflow-hidden flex flex-col relative">

    <nav class="absolute top-4 left-1/2 transform -translate-x-1/2 z-50 glass-panel rounded-full shadow-lg p-1 flex gap-1 w-[70%] max-w-[200px]">
        <button id="navDrawBtn" class="flex-1 py-1.5 px-3 rounded-full text-xs font-bold transition-all bg-white shadow-sm text-indigo-600">🎨 設計</button>
        <button id="navZooBtn" class="flex-1 py-1.5 px-3 rounded-full text-xs font-bold transition-all text-slate-500">🏫 SWCSSS</button>
    </nav>

    <main id="viewDraw" class="absolute inset-0 w-full max-w-md mx-auto flex flex-col items-center p-4 z-10 overflow-y-auto pt-20 pb-10">
        <div class="glass-panel p-6 rounded-[2rem] shadow-2xl w-full text-center relative shrink-0 my-auto">
            <h1 class="text-3xl font-black mb-1 text-indigo-900">智啟設計工坊 🤖</h1>
            <p class="text-slate-600 font-medium text-sm mb-4">『語』您同行，智啟明天</p>
            
            <div class="w-full aspect-square bg-white rounded-2xl shadow-inner border-4 border-indigo-100 overflow-hidden relative mb-4">
                <canvas id="drawCanvas" width="400" height="400" class="w-full h-full cursor-crosshair"></canvas>
            </div>
            
            <div class="flex gap-3 w-full mb-4 justify-center" id="colorPalette">
                <button class="w-10 h-10 rounded-full border-[3px] border-white ring-2 ring-indigo-500" style="background-color: #1e293b;" data-color="#1e293b"></button>
                <button class="w-10 h-10 rounded-full border-[3px] border-white" style="background-color: #ef4444;" data-color="#ef4444"></button>
                <button class="w-10 h-10 rounded-full border-[3px] border-white" style="background-color: #3b82f6;" data-color="#3b82f6"></button>
                <button class="w-10 h-10 rounded-full border-[3px] border-white" style="background-color: #22c55e;" data-color="#22c55e"></button>
            </div>

            <div class="flex gap-3 w-full mb-6">
                <button id="resetBtn" class="flex-1 bg-rose-50 text-rose-600 py-2.5 rounded-xl font-bold text-sm">🗑️ 重置</button>
            </div>

            <button id="sendBtn" class="w-full bg-gradient-to-r from-indigo-500 via-sky-500 to-emerald-500 text-white py-4 rounded-xl font-black text-lg shadow-lg mb-4 transform active:scale-95 transition-transform">
                ⚡ 啟動機械人並傳送 ⚡
            </button>

            <div class="w-full bg-indigo-50 border border-indigo-100 rounded-xl p-3 text-left shadow-sm">
                <h3 class="text-indigo-800 font-bold text-xs mb-1 flex items-center gap-1">✨ AI 智能分析</h3>
                <p class="text-indigo-600/80 text-[11px] leading-relaxed font-semibold">
                    當您按下「啟動」時，AI 會辨識您的塗鴉，為機械人命名、設定核心功能，並賦予靈魂。
                </p>
            </div>
        </div>
    </main>

    <main id="viewZoo" class="absolute inset-0 bg-gradient-to-br from-indigo-50 via-sky-50 to-emerald-50 hidden h-full w-full overflow-hidden">
        <div id="zooContainer" class="absolute inset-0 w-full h-full z-10"></div>
    </main>

    <div id="processingOverlay" class="fixed inset-0 bg-indigo-900/80 backdrop-blur-md z-[100] hidden flex-col items-center justify-center text-white">
        <div class="magic-spinner mb-6"></div>
        <h2 class="text-2xl font-black mb-2">系統分析中...</h2>
        <p class="text-indigo-200">正在賦予機械人靈魂，請稍候</p>
    </div>

    <div id="modalOverlay" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[200] hidden items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[2rem] shadow-2xl relative p-6 text-center">
            <button id="closeModalBtn" class="absolute top-4 right-4 text-slate-400 text-xl">✕</button>
            <div class="w-32 h-32 bg-slate-50 mx-auto rounded-2xl mb-4 p-2">
                <img src="" id="modalImg" class="w-full h-full object-contain">
            </div>
            <h2 id="modalName" class="text-2xl font-black mb-2 text-indigo-900">名字</h2>
            <p id="modalPersonality" class="text-slate-600 text-sm mb-4">描述</p>
            <p id="modalQuote" class="text-indigo-600 font-bold italic">"台詞"</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, remove, onChildRemoved } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxceo3lq2CNXtYBUQBsoc00NO800o1Xk4",
            authDomain: "project-7577690681598110536.firebaseapp.com",
            databaseURL: "https://project-7577690681598110536-default-rtdb.firebaseio.com",
            projectId: "project-7577690681598110536",
            storageBucket: "project-7577690681598110536.firebasestorage.app",
            messagingSenderId: "239454542830",
            appId: "1:239454542830:web:56f1fb2646d1f8b9eb4cff"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const drawingsRef = ref(db, 'drawings');

        const GLM_API_URL = "https://open.bigmodel.cn/api/paas/v4/chat/completions";
        const apiKey = "e2bf1f2b563e43789f2ef97c3fc51f65.R0QpxNoSojQSMVGT";

        let currentMode = 'draw';
        let artworks = [];
        let isZooPaused = false;
        let activeSpotlights = 0;
        const pageLoadTime = Date.now();

        // --- 畫布邏輯 ---
        const canvas = document.getElementById('drawCanvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;
        ctx.lineWidth = 10; ctx.lineCap = 'round'; ctx.strokeStyle = '#1e293b';

        function getCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: (clientX - rect.left) * (canvas.width / rect.width), y: (clientY - rect.top) * (canvas.height / rect.height) };
        }
        canvas.addEventListener('mousedown', (e) => { isDrawing = true; ctx.beginPath(); const c = getCoords(e); ctx.moveTo(c.x, c.y); });
        window.addEventListener('mousemove', (e) => { if(!isDrawing) return; const c = getCoords(e); ctx.lineTo(c.x, c.y); ctx.stroke(); });
        window.addEventListener('mouseup', () => isDrawing = false);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); isDrawing = true; ctx.beginPath(); const c = getCoords(e); ctx.moveTo(c.x, c.y); });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); if(!isDrawing) return; const c = getCoords(e); ctx.lineTo(c.x, c.y); ctx.stroke(); });

        document.getElementById('resetBtn').onclick = () => ctx.clearRect(0,0,400,400);
        document.querySelectorAll('#colorPalette button').forEach(b => b.onclick = (e) => {
            document.querySelectorAll('#colorPalette button').forEach(btn => btn.classList.remove('ring-2'));
            e.target.classList.add('ring-2');
            ctx.strokeStyle = e.target.dataset.color;
        });

        // --- UI 切換 ---
        function switchMode(m) {
            currentMode = m;
            document.getElementById('viewDraw').classList.toggle('hidden', m !== 'draw');
            document.getElementById('viewZoo').classList.toggle('hidden', m !== 'zoo');
            document.getElementById('navDrawBtn').classList.toggle('bg-white', m === 'draw');
            document.getElementById('navDrawBtn').classList.toggle('text-indigo-600', m === 'draw');
            document.getElementById('navZooBtn').classList.toggle('bg-white', m === 'zoo');
            document.getElementById('navZooBtn').classList.toggle('text-indigo-600', m === 'zoo');
        }
        document.getElementById('navDrawBtn').onclick = () => switchMode('draw');
        document.getElementById('navZooBtn').onclick = () => switchMode('zoo');

        // --- 🤫 秘密管理員 (SHA-256) ---
        let adminClickCount = 0;
        let lastClickTime = 0;
        async function sha256(m) {
            const buf = new TextEncoder().encode(m);
            const hash = await crypto.subtle.digest('SHA-256', buf);
            return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join('');
        }
        document.getElementById('navZooBtn').addEventListener('click', async () => {
            const now = Date.now();
            if (now - lastClickTime > 1000) adminClickCount = 0;
            adminClickCount++; lastClickTime = now;
            if (adminClickCount === 5) {
                const pwd = prompt("管理員授權：");
                if (pwd) {
                    const h = await sha256(pwd);
                    if (h === "39610260662d98c16053748f328f41e57c8651c6b659c636f014e36500732df3") {
                        if (confirm("清空整個展示廳？")) remove(drawingsRef);
                    }
                }
                adminClickCount = 0;
            }
        });

        // --- AI 啟動 ---
        document.getElementById('sendBtn').onclick = async () => {
            const overlay = document.getElementById('processingOverlay');
            overlay.style.display = 'flex';
            try {
                const imgData = canvas.toDataURL('image/png');
                const response = await fetch(GLM_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                    body: JSON.stringify({
                        model: "glm-4.1v-thinking-flash",
                        messages: [{ role: "user", content: [{ type: "text", text: "辨識圖中角色，回傳 JSON: name, personality, quote"}, { type: "image_url", image_url: { url: imgData }}]}]
                    })
                });
                const resData = await response.json();
                const aiSoul = JSON.parse(resData.choices[0].message.content.replace(/```json|```/g, ''));
                await push(drawingsRef, { image: imgData, ...aiSoul, timestamp: Date.now() });
                overlay.style.display = 'none';
                switchMode('zoo');
                ctx.clearRect(0,0,400,400);
            } catch (e) { alert("AI 啟動失敗"); overlay.style.display = 'none'; }
        };

        // --- 展示廳動畫與碰撞 ---
        function showGreeting(art) {
            if (!art.lastG || Date.now() - art.lastG > 3000) {
                art.lastG = Date.now();
                const b = document.createElement('div'); b.className = 'greeting-bubble'; b.innerText = '你好！';
                art.wrapper.appendChild(b);
                setTimeout(() => b.remove(), 2500);
            }
        }

        onChildAdded(drawingsRef, (snap) => {
            const data = snap.val();
            const wrapper = document.createElement('div');
            wrapper.className = 'moving-wrapper';
            const img = document.createElement('img');
            img.src = data.image; img.className = 'sprite anim-walk';
            wrapper.appendChild(img);
            document.getElementById('zooContainer').appendChild(wrapper);

            const isNew = data.timestamp > pageLoadTime;
            const art = {
                key: snap.key, wrapper, sprite: img,
                x: isNew ? window.innerWidth/2 - 70 : Math.random()*(window.innerWidth-140),
                y: isNew ? window.innerHeight/2 - 70 : Math.random()*(window.innerHeight-140),
                dx: (Math.random()*0.2+0.2)*(Math.random()>0.5?1:-1),
                dy: (Math.random()*0.2+0.2)*(Math.random()>0.5?1:-1),
                isResting: isNew
            };
            artworks.push(art);

            if (isNew) {
                activeSpotlights++;
                document.getElementById('zooContainer').classList.add('zoo-spotlight-active');
                wrapper.classList.add('spotlight-entity');
                setTimeout(() => {
                    art.isResting = false;
                    wrapper.classList.remove('spotlight-entity');
                    activeSpotlights--;
                    if(activeSpotlights<=0) document.getElementById('zooContainer').classList.remove('zoo-spotlight-active');
                }, 8000);
            }
            wrapper.onclick = () => {
                isZooPaused = true;
                document.getElementById('modalImg').src = data.image;
                document.getElementById('modalName').innerText = data.name;
                document.getElementById('modalPersonality').innerText = data.personality;
                document.getElementById('modalQuote').innerText = data.quote;
                document.getElementById('modalOverlay').style.display = 'flex';
            };
        });

        onChildRemoved(drawingsRef, (snap) => {
            const idx = artworks.findIndex(a => a.key === snap.key);
            if (idx !== -1) { artworks[idx].wrapper.remove(); artworks.splice(idx, 1); }
        });

        document.getElementById('closeModalBtn').onclick = () => { 
            document.getElementById('modalOverlay').style.display = 'none'; 
            isZooPaused = false; 
        };

        function animate() {
            if (!isZooPaused && currentMode === 'zoo') {
                const w = window.innerWidth, h = window.innerHeight;
                artworks.forEach(a => {
                    if (a.isResting) return;
                    // 移動與彈牆
                    if (a.x + 140 >= w || a.x <= 0) a.dx *= -1;
                    if (a.y + 140 >= h || a.y <= 0) a.dy *= -1;
                    a.x += a.dx; a.y += a.dy;
                    a.sprite.classList.toggle('facing-left', a.dx < 0);
                    a.sprite.classList.toggle('facing-right', a.dx > 0);
                    a.wrapper.style.left = a.x + 'px'; a.wrapper.style.top = a.y + 'px';
                });

                // 碰撞偵測 (兩兩比對)
                for (let i = 0; i < artworks.length; i++) {
                    for (let j = i + 1; j < artworks.length; j++) {
                        const a = artworks[i], b = artworks[j];
                        if (a.isResting || b.isResting) continue;
                        const dx = a.x - b.x, dy = a.y - b.y;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        if (dist < 110) {
                            // 物理反彈
                            [a.dx, b.dx] = [b.dx, a.dx]; [a.dy, b.dy] = [b.dy, a.dy];
                            // 稍微推開防止黏住
                            a.x += a.dx * 2; a.y += a.dy * 2;
                            showGreeting(a); showGreeting(b);
                        }
                    }
                }
            }
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
