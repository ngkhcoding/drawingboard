<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🏫 SWCSSS 智啟展示廳</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; overscroll-behavior: none; }
        
        /* 隱藏捲軸但保持可捲動 */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        
        /* 繪圖畫布的專屬樣式 */
        canvas { touch-action: none; }
        
        /* 毛玻璃特效 */
        .glass-panel {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* --- ✨ 聚光燈暗化與模糊背景特效 --- */
        #zooContainer::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.55); /* 深藍色半透明遮罩 */
            backdrop-filter: blur(8px); /* 讓背景與其他畫作虛化 */
            -webkit-backdrop-filter: blur(8px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 1.5s ease;
            z-index: 90; /* 覆蓋在一般畫作(z-index:5)之上 */
        }
        /* 當有新生命誕生時啟動此 class */
        #zooContainer.zoo-spotlight-active::before {
            opacity: 1;
        }

        /* --- ✨ 動態漂浮容器 (負責 X,Y 移動) --- */
        .moving-wrapper {
            position: absolute;
            width: 140px;
            height: 140px;
            cursor: pointer;
            z-index: 5;
            transition: filter 0.3s, opacity 0.3s, transform 0.3s;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.15));
        }
        .moving-wrapper:hover {
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.3));
            z-index: 10;
        }
        .moving-wrapper:hover .sprite {
            transform: scale(1.15) rotate(-5deg) scaleX(var(--facing, 1));
        }

        /* --- ✨ 角色精靈圖案與方向 (負責動畫與轉身) --- */
        .sprite {
            width: 100%;
            height: 100%;
            object-fit: contain;
            --facing: 1; /* 1 向右, -1 向左 */
            transform: scaleX(var(--facing));
            transition: transform 0.3s ease; /* 讓轉身平滑 */
        }
        .facing-left { --facing: -1; }
        .facing-right { --facing: 1; }

        /* --- ✨ 狀態動畫：走路 (雙腳搖擺) --- */
        .anim-walk { animation: walkCycle 1s infinite alternate ease-in-out; }
        @keyframes walkCycle {
            0% { transform: scaleX(var(--facing)) translateY(0px) rotate(0deg); }
            50% { transform: scaleX(var(--facing)) translateY(-6px) rotate(5deg); }
            100% { transform: scaleX(var(--facing)) translateY(0px) rotate(-5deg); }
        }

        /* --- ✨ 狀態動畫：打招呼 (左右揮動) --- */
        .anim-wave { animation: waveAction 1.5s ease-in-out; }
        @keyframes waveAction {
            0%, 100% { transform: scaleX(var(--facing)) rotate(0deg); }
            20%, 60% { transform: scaleX(var(--facing)) rotate(25deg); }
            40%, 80% { transform: scaleX(var(--facing)) rotate(-15deg); }
        }

        /* --- ✨ 狀態動畫：鞠躬 (向前傾倒) --- */
        .anim-bow { animation: bowAction 1.5s ease-in-out; }
        @keyframes bowAction {
            0%, 100% { transform: scaleX(var(--facing)) rotate(0deg) translateY(0); }
            40%, 60% { transform: scaleX(var(--facing)) rotate(20deg) translateY(12px) scaleY(0.85); }
        }

        /* 讀取中動畫 */
        .magic-spinner {
            width: 60px; height: 60px;
            border: 6px solid rgba(255,255,255,0.3);
            border-top-color: #fff; border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 彈出視窗動畫 */
        .animate-pop {
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.8) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* 新加入圖案的聚光燈特效 (加強發光特寫) */
        .spotlight-entity {
            transform: scale(2.2) !important;
            z-index: 100 !important; /* 確保在新背景遮罩(z-index:90)之上 */
            filter: drop-shadow(0 0 45px rgba(255, 255, 255, 0.9)) drop-shadow(0 15px 25px rgba(0,0,0,0.6)) !important;
            transition: transform 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 1.5s !important;
        }

        /* 聚光燈自我介紹對話框 (12秒，顯示在下方) */
        .speech-bubble {
            position: absolute;
            z-index: 101; /* 確保在最頂層 */
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(4px);
            border: 2px solid #4f46e5;
            border-radius: 1rem;
            padding: 0.75rem 1.25rem;
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.3);
            font-weight: 800;
            color: #4338ca;
            pointer-events: none;
            opacity: 0;
            text-align: center;
            max-width: 280px;
            animation: fadeInOutBubble 12s ease-in-out forwards;
        }
        
        /* 對話框箭頭調整為朝上 */
        .speech-bubble::after {
            content: '';
            position: absolute;
            top: -10px; 
            left: 50%;
            transform: translateX(-50%);
            border-width: 0 10px 10px 10px; 
            border-style: solid;
            border-color: transparent transparent #4f46e5 transparent; 
        }
        .speech-bubble::before {
            content: '';
            position: absolute;
            top: -7px; 
            left: 50%;
            transform: translateX(-50%);
            border-width: 0 8px 8px 8px; 
            border-style: solid;
            border-color: transparent transparent white transparent; 
            z-index: 1;
        }
        @keyframes fadeInOutBubble {
            0% { opacity: 0; transform: translate(-50%, -20px) scale(0.8); }
            5% { opacity: 1; transform: translate(-50%, 0) scale(1); }
            95% { opacity: 1; transform: translate(-50%, 0) scale(1); }
            100% { opacity: 0; transform: translate(-50%, 20px) scale(0.8); }
        }
    </style>
</head>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, remove, onChildRemoved } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

        // ==========================================
        // 1. 環境變數與初始化
        // ==========================================
        
        // Firebase 設定
        const firebaseConfig = {
            apiKey: "AIzaSyCxceo3lq2CNXtYBUQBsoc00NO800o1Xk4",
            authDomain: "project-7577690681598110536.firebaseapp.com",
            databaseURL: "https://project-7577690681598110536-default-rtdb.firebaseio.com",
            projectId: "project-7577690681598110536",
            storageBucket: "project-7577690681598110536.firebasestorage.app",
            messagingSenderId: "239454542830",
            appId: "1:239454542830:web:56f1fb2646d1f8b9eb4cff",
            measurementId: "G-LCFZK9RY8Z"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const drawingsRef = ref(db, 'drawings');

        // GLM AI API 設定
        const apiKey = "e2bf1f2b563e43789f2ef97c3fc51f65.R0QpxNoSojQSMVGT"; 
        const GLM_API_URL = "https://open.bigmodel.cn/api/paas/v4/chat/completions";

        // 全域狀態
        let currentMode = 'draw'; 
        const zooRegistry = {}; 
        let artworks = []; 
        let isZooPaused = false;
        const pageLoadTime = Date.now(); 
        let currentSelectedKey = null;
        let activeSpotlights = 0; // 計算目前有幾個畫作正在聚光燈中

        // ==========================================
        // 2. UI 導覽切換邏輯
        // ==========================================
        const viewDraw = document.getElementById('viewDraw');
        const viewZoo = document.getElementById('viewZoo');
        const navDrawBtn = document.getElementById('navDrawBtn');
        const navZooBtn = document.getElementById('navZooBtn');

        function switchMode(mode) {
            currentMode = mode;
            if (mode === 'draw') {
                viewDraw.classList.remove('hidden'); viewZoo.classList.add('hidden');
                navDrawBtn.className = "flex-1 py-1.5 px-3 rounded-full text-xs font-bold transition-all bg-white shadow-sm text-indigo-600";
                navZooBtn.className = "flex-1 py-1.5 px-3 rounded-full text-xs font-bold transition-all text-slate-500 hover:text-slate-800";
            } else {
                viewZoo.classList.remove('hidden'); viewDraw.classList.add('hidden');
                navZooBtn.className = "flex-1 py-1.5 px-3 rounded-full text-xs font-bold transition-all bg-white shadow-sm text-teal-600";
                navDrawBtn.className = "flex-1 py-1.5 px-3 rounded-full text-xs font-bold transition-all text-slate-500 hover:text-slate-800";
            }
        }

        navDrawBtn.addEventListener('click', () => switchMode('draw'));
        navZooBtn.addEventListener('click', () => switchMode('zoo'));

        // ==========================================
        // 3. 繪圖板邏輯 (Canvas)
        // ==========================================
        const canvas = document.getElementById('drawCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        
        let isDrawing = false;
        let historyPushStack = [];
        
        ctx.lineWidth = 8; 
        ctx.lineCap = 'round'; 
        ctx.lineJoin = 'round';
        ctx.strokeStyle = '#1e293b'; // 預設深灰色

        // 顏色選擇邏輯
        const colorBtns = document.querySelectorAll('#colorPalette button');
        colorBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                colorBtns.forEach(b => { 
                    b.classList.remove('ring-2', 'ring-indigo-500'); 
                    b.classList.add('ring-transparent'); 
                });
                const target = e.currentTarget;
                target.classList.remove('ring-transparent');
                target.classList.add('ring-2', 'ring-indigo-500');
                ctx.strokeStyle = target.dataset.color;
            });
        });

        function saveHistory() {
            historyPushStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
            if (historyPushStack.length > 30) historyPushStack.shift();
        }
        
        saveHistory(); 

        function getCanvasCoordinates(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX, clientY;
            if (e.touches && e.touches[0]) {
                clientX = e.touches[0].clientX; clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX; clientY = e.clientY;
            }
            return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
        }

        function startDrawing(e) {
            isDrawing = true;
            const coords = getCanvasCoordinates(e);
            ctx.beginPath(); ctx.moveTo(coords.x, coords.y); ctx.lineTo(coords.x, coords.y); ctx.stroke();
            if(e.cancelable && e.type.startsWith('touch')) e.preventDefault();
        }

        function drawMoving(e) {
            if (!isDrawing) return;
            const coords = getCanvasCoordinates(e);
            ctx.lineTo(coords.x, coords.y); ctx.stroke();
            if(e.cancelable && e.type.startsWith('touch')) e.preventDefault();
        }

        function stopDrawing(e) {
            if (isDrawing) { isDrawing = false; ctx.closePath(); saveHistory(); }
        }

        canvas.addEventListener('mousedown', startDrawing);
        window.addEventListener('mousemove', drawMoving);
        window.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('touchstart', startDrawing, { passive: false });
        canvas.addEventListener('touchmove', drawMoving, { passive: false });
        window.addEventListener('touchend', stopDrawing);
        window.addEventListener('touchcancel', stopDrawing);

        document.getElementById('undoBtn').addEventListener('click', () => {
            if (historyPushStack.length > 1) {
                historyPushStack.pop(); 
                ctx.putImageData(historyPushStack[historyPushStack.length - 1], 0, 0);
            }
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            historyPushStack = []; saveHistory();
        });

        // ==========================================
        // 4. GLM AI 核心邏輯
        // ==========================================
        const overlay = document.getElementById('processingOverlay');
        const statusTitle = document.getElementById('aiStatusTitle');
        const statusDesc = document.getElementById('aiStatusDesc');

        function setOverlayStatus(title, desc, isLoading = true) {
            statusTitle.innerText = title;
            statusDesc.innerText = desc;
            document.querySelector('.magic-spinner').style.display = isLoading ? 'block' : 'none';
        }

        async function analyzeImageWithAI(base64Image) {
            const payload = {
                model: "glm-4.1v-thinking-flash", 
                messages: [
                    {
                        role: "user",
                        content: [
                            {
                                type: "text",
                                text: "這是一張由學生繪製的簡單線條塗鴉。請發揮創意辨識它像一個什麼樣的機械人，並配合新會商會中學「『語』您同行，智啟明天」的主題，為這個機械人賦予靈魂。回傳純 JSON 格式，必須包含以下 key：'name'(有趣繁體中文機械人名字), 'personality'(一句話形容它的智能或性格), 'likes'(最喜歡執行什麼任務或事物), 'quote'(專屬經典台詞)。不要有 Markdown 標記。"
                            },
                            {
                                type: "image_url",
                                image_url: { url: base64Image }
                            }
                        ]
                    }
                ]
            };

            setOverlayStatus("AI 正在啟動...", "分析這張草圖能成為什麼樣的機械人");

            let retries = 5;
            let delay = 1000;
            
            while (retries > 0) {
                try {
                    const response = await fetch(GLM_API_URL, {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${apiKey}`
                        },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    
                    const data = await response.json();
                    let aiTextResponse = data.choices?.[0]?.message?.content;
                    if(!aiTextResponse) throw new Error("AI 回應格式錯誤");

                    aiTextResponse = aiTextResponse.replace(/```json/g, '').replace(/```/g, '').trim();
                    
                    setOverlayStatus("核心模組建立中！", "正在準備機械人的專屬名片...");
                    return JSON.parse(aiTextResponse);

                } catch (error) {
                    console.error("API Call Failed. Retries left:", retries - 1, error);
                    retries--;
                    if (retries === 0) throw error;
                    await new Promise(resolve => setTimeout(resolve, delay));
                    delay *= 2;
                }
            }
        }

        document.getElementById('sendBtn').addEventListener('click', async () => {
            if(historyPushStack.length <= 1) { alert("請先在畫布上設計您的機械人喔！"); return; }

            overlay.style.display = 'flex';
            setTimeout(()=> overlay.classList.remove('opacity-0'), 10);
            setOverlayStatus("系統連線中...", "正在分析設計圖的智能模組...");

            try {
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = canvas.width; tempCanvas.height = canvas.height;
                const tempCtx = tempCanvas.getContext('2d');
                tempCtx.fillStyle = 'white'; tempCtx.fillRect(0,0,tempCanvas.width,tempCanvas.height);
                tempCtx.drawImage(canvas, 0, 0);
                const imageData = tempCanvas.toDataURL('image/png');

                const aiSoul = await analyzeImageWithAI(imageData);
                
                const finalPayload = {
                    image: imageData, 
                    aiName: aiSoul.name || "神祕機械人", 
                    aiPersonality: aiSoul.personality || "未知功能", 
                    aiLikes: aiSoul.likes || "充電",
                    aiQuote: aiSoul.quote || "系統啟動中...", 
                    timestamp: Date.now()
                };

                setOverlayStatus("啟動成功！", `您的「${finalPayload.aiName}」已正式上線！`, false);

                await push(drawingsRef, finalPayload);

                setTimeout(() => {
                    overlay.style.display = 'none';
                    document.getElementById('resetBtn').click();
                    switchMode('zoo');
                }, 2000);

            } catch (error) {
                console.error(error);
                setOverlayStatus("啟動失敗", "API 連結出錯，請稍後重試 😢", false);
                setTimeout(() => { overlay.style.display = 'none'; }, 3000);
            }
        });

        // ==========================================
        // 5. 展示廳大廳邏輯 (展示與互動)
        // ==========================================
        const zooContainer = document.getElementById('zooContainer');

        function removeWhiteBackground(base64Image, callback) {
            const tempImg = new Image(); tempImg.src = base64Image;
            tempImg.onload = () => {
                const tCanvas = document.createElement('canvas'); tCanvas.width = tempImg.width; tCanvas.height = tempImg.height;
                const tCtx = tCanvas.getContext('2d', { willReadFrequently: true }); 
                tCtx.drawImage(tempImg, 0, 0);
                const imgData = tCtx.getImageData(0, 0, tCanvas.width, tCanvas.height); 
                const data = imgData.data;
                for (let i = 0; i < data.length; i += 4) { 
                    if (data[i] > 230 && data[i+1] > 230 && data[i+2] > 230) { data[i+3] = 0; } 
                }
                tCtx.putImageData(imgData, 0, 0); 
                callback(tCanvas.toDataURL('image/png'));
            };
        }

        // 名片 UI 變數
        const modalOverlay = document.getElementById('modalOverlay');
        const modalImg = document.getElementById('modalImg');
        const modalName = document.getElementById('modalName');
        const modalPersonality = document.getElementById('modalPersonality');
        const modalQuote = document.getElementById('modalQuote');

        function closeCharacterCard() { 
            modalOverlay.style.display = 'none'; 
            isZooPaused = false; 
            currentSelectedKey = null;
        }
        
        document.getElementById('closeModalBtn').addEventListener('click', closeCharacterCard);
        modalOverlay.addEventListener('click', (e) => { if(e.target === modalOverlay) closeCharacterCard(); });

        // 個別刪除
        document.getElementById('deleteEntityBtn').addEventListener('click', async () => {
            if (!currentSelectedKey) return;
            const pwd = prompt("請輸入密碼以刪除此圖案：");
            if (pwd !== '122333') {
                if (pwd !== null) alert("密碼錯誤！");
                return;
            }
            if (confirm("確定要刪除這個圖案嗎？此動作無法復原。")) {
                try {
                    await remove(ref(db, `drawings/${currentSelectedKey}`));
                    closeCharacterCard();
                } catch (err) {
                    alert("刪除失敗：" + err.message);
                }
            }
        });

        function openCharacterCard(key, transparentImage) {
            const character = zooRegistry[key];
            if(!character) return;
            isZooPaused = true; 
            currentSelectedKey = key;
            
            modalImg.src = transparentImage;
            modalName.innerText = character.aiName;
            modalPersonality.innerText = character.aiPersonality;
            modalQuote.innerText = character.aiQuote;
            
            modalOverlay.style.display = 'flex';
        }

        // Firebase 監聽新增
        onChildAdded(drawingsRef, (snapshot) => {
            const data = snapshot.val();
            const firebaseKey = snapshot.key;
            zooRegistry[firebaseKey] = data;

            removeWhiteBackground(data.image, (transparentImageData) => {
                // 1. 建立外層容器 (負責 XY 移動)
                const wrapperEl = document.createElement('div');
                wrapperEl.className = 'moving-wrapper';
                wrapperEl.id = 'wrapper_' + firebaseKey;

                // 2. 建立內層圖案 (負責動作動畫)
                const imgEl = document.createElement('img');
                imgEl.src = transparentImageData;
                
                wrapperEl.appendChild(imgEl);
                
                wrapperEl.addEventListener('click', () => {
                    openCharacterCard(firebaseKey, transparentImageData);
                });
                
                zooContainer.appendChild(wrapperEl);

                const isNewItem = data.timestamp > pageLoadTime;
                let startX, startY, isResting = false;

                // --- 🌟 減慢移動速度 (慢速但保持順暢) ---
                let initDx = (Math.random() * 0.25 + 0.15) * (Math.random() > 0.5 ? 1 : -1);
                let initDy = (Math.random() * 0.25 + 0.15) * (Math.random() > 0.5 ? 1 : -1);

                // 設定初始方向與預設走路動畫
                const initialFacing = initDx > 0 ? 'facing-right' : 'facing-left';
                imgEl.className = 'sprite anim-walk ' + initialFacing;

                if (isNewItem) {
                    // --- ✨ 啟動背景虛化與聚光燈特效 ---
                    activeSpotlights++;
                    zooContainer.classList.add('zoo-spotlight-active');

                    startX = (window.innerWidth / 2) - 70;
                    startY = (window.innerHeight / 2) - 70;
                    isResting = true;
                    wrapperEl.classList.add('spotlight-entity');
                    
                    const likesText = data.aiLikes || "處理數據"; 
                    const bubble = document.createElement('div');
                    bubble.className = 'speech-bubble';
                    bubble.innerText = `「我是${data.aiName}，最喜歡${likesText}！」`;
                    bubble.style.left = '50%';
                    bubble.style.top = 'calc(50% + 150px)'; /* 對話框移至圖案下方 */
                    bubble.style.transform = 'translateX(-50%)';
                    zooContainer.appendChild(bubble);
                    
                    setTimeout(() => {
                        const artIndex = artworks.findIndex(a => a.key === firebaseKey);
                        if(artIndex !== -1) {
                            artworks[artIndex].isResting = false;
                            wrapperEl.classList.remove('spotlight-entity');
                        }
                        if (bubble.parentNode) bubble.remove();

                        // --- 關閉背景虛化 ---
                        activeSpotlights--;
                        if (activeSpotlights <= 0) {
                            activeSpotlights = 0;
                            zooContainer.classList.remove('zoo-spotlight-active');
                        }
                    }, 12000); /* 延長停留時間至 12s */
                } else {
                    startX = Math.random() * (window.innerWidth - 180) + 20;
                    startY = Math.random() * (window.innerHeight - 180) + 20;
                }

                // 記錄至狀態陣列
                const artData = {
                    key: firebaseKey,
                    wrapper: wrapperEl,
                    sprite: imgEl,
                    x: startX,
                    y: startY,
                    dx: initDx,
                    dy: initDy,
                    isResting: isResting,
                    state: 'walk', // 預設狀態：走路
                    stateTimer: Math.floor(Math.random() * 200 + 100) // 狀態維持的畫格數
                };
                artworks.push(artData);
            });
        });

        // Firebase 監聽刪除
        onChildRemoved(drawingsRef, (snapshot) => {
            const firebaseKey = snapshot.key;
            // 移除 wrapper 外層
            const wrapperEl = document.getElementById('wrapper_' + firebaseKey);
            if(wrapperEl) {
                wrapperEl.style.opacity = '0';
                wrapperEl.style.transform = 'scale(0)';
                setTimeout(() => wrapperEl.remove(), 300);
            }
            artworks = artworks.filter(art => art.key !== firebaseKey);
            delete zooRegistry[firebaseKey];
            if(modalOverlay.style.display === 'flex' && currentSelectedKey === firebaseKey) {
                closeCharacterCard();
            }
        });

        // 核心動畫迴圈
        function animateZoo() {
            if (!isZooPaused && currentMode === 'zoo') {
                const w = window.innerWidth;
                const h = window.innerHeight;
                artworks.forEach((art) => {
                    if (art.isResting) {
                        art.x = (window.innerWidth / 2) - 70;
                        art.y = (window.innerHeight / 2) - 70;
                        art.wrapper.style.left = art.x + 'px'; 
                        art.wrapper.style.top = art.y + 'px';
                        return; 
                    }

                    // --- 🧠 狀態機邏輯：AI 決定現在要做什麼動作 ---
                    art.stateTimer--;
                    if (art.stateTimer <= 0) {
                        const rand = Math.random();
                        const facingClass = art.dx > 0 ? 'facing-right' : 'facing-left';

                        if (rand < 0.7) {
                            // 70% 機率：繼續走路
                            art.state = 'walk';
                            art.sprite.className = 'sprite anim-walk ' + facingClass;
                            art.stateTimer = Math.floor(Math.random() * 300 + 200); 
                        } else if (rand < 0.85) {
                            // 15% 機率：停下來打招呼
                            art.state = 'wave';
                            art.sprite.className = 'sprite anim-wave ' + facingClass;
                            art.stateTimer = 90; 
                        } else {
                            // 15% 機率：停下來鞠躬
                            art.state = 'bow';
                            art.sprite.className = 'sprite anim-bow ' + facingClass;
                            art.stateTimer = 90; 
                        }
                    }

                    // --- 🚶 移動邏輯：只有在「走路狀態」才前進 ---
                    if (art.state === 'walk') {
                        // 邊界防卡死邏輯：強制設定方向而不是單純反轉
                        if (art.x + 140 >= w) {
                            art.dx = -Math.abs(art.dx);
                        } else if (art.x <= 0) {
                            art.dx = Math.abs(art.dx);
                        }
                        
                        if (art.y + 140 >= h) {
                            art.dy = -Math.abs(art.dy);
                        } else if (art.y <= 0) {
                            art.dy = Math.abs(art.dy);
                        }

                        // 處理轉身方向視覺
                        if (art.dx > 0) {
                            art.sprite.classList.remove('facing-left');
                            art.sprite.classList.add('facing-right');
                        } else {
                            art.sprite.classList.remove('facing-right');
                            art.sprite.classList.add('facing-left');
                        }
                        
                        art.x += art.dx; 
                        art.y += art.dy;
                    }

                    art.wrapper.style.left = art.x + 'px'; 
                    art.wrapper.style.top = art.y + 'px';
                });
            }
            requestAnimationFrame(animateZoo);
        }
        animateZoo();

        // 全域清空
        document.getElementById('globalResetBtn').addEventListener('click', () => {
            if(Object.keys(zooRegistry).length === 0) { alert("展示廳目前已經是空的了喔！"); return; }
            
            const pwd = prompt("請輸入密碼以清空展示廳：");
            if (pwd !== '122333') {
                if (pwd !== null) alert("密碼錯誤！");
                return;
            }

            if(confirm("確定要將所有機械人關機，清空 SWCSSS 展示廳嗎？")) { 
                remove(drawingsRef); 
            }
        });

    </script>
</body>
</html>
