<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多人 AI 互動繪圖森林</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            touch-action: none;
            overflow: hidden;
            background-color: #f0fdf4; /* 淺綠色背景 */
        }
        .canvas-container {
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border-radius: 1.5rem;
            background: white;
            position: relative;
        }
        #drawingCanvas {
            cursor: crosshair;
            touch-action: none;
        }
        .ai-loading {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.8);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 1.5rem;
            z-index: 20;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #10b981;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #aiCard {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: translateY(120%);
        }
        #aiCard.active {
            transform: translateY(0);
        }
    </style>
</head>
<body class="h-screen flex flex-col font-sans">

    <!-- 頁面 1: 繪圖區 -->
    <div id="page1" class="absolute inset-0 z-10 bg-green-50 flex flex-col items-center justify-center p-4 transition-opacity duration-500">
        <div class="text-center mb-6">
            <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-green-600 to-emerald-600">
                多人 AI 繪圖森林
            </h1>
            <p class="text-green-700 mt-2">在這裡繪畫，你的作品會出現在所有人的森林裡！</p>
        </div>
        
        <div class="canvas-container border-4 border-white">
            <div id="aiLoader" class="ai-loading">
                <div class="spinner mb-4"></div>
                <p class="text-green-600 font-bold">Gemini 正在為角色注入靈魂...</p>
            </div>
            <canvas id="drawingCanvas" width="400" height="400"></canvas>
        </div>

        <div class="mt-8 flex gap-4">
            <button id="clearBtn" class="px-6 py-3 bg-white text-green-600 rounded-2xl hover:bg-green-100 transition font-semibold shadow-sm">
                清空重畫
            </button>
            <button id="sendBtn" class="px-10 py-3 bg-green-600 text-white rounded-2xl hover:bg-green-700 transition shadow-xl font-bold flex items-center gap-2">
                <span>傳送到森林</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" />
                </svg>
            </button>
        </div>
        
        <button id="viewGallery" class="mt-8 text-green-600 hover:text-green-800 text-sm font-medium underline decoration-dotted">查看森林現況 →</button>
    </div>

    <!-- 頁面 2: 動畫展示區 -->
    <div id="page2" class="absolute inset-0 z-0 bg-[#061a0d] opacity-0 pointer-events-none transition-opacity duration-700">
        <div class="absolute top-6 left-6 z-30 pointer-events-auto flex items-center gap-4">
            <button id="backBtn" class="px-4 py-2 bg-white/10 hover:bg-white/20 text-white border border-white/10 rounded-xl backdrop-blur-md flex items-center gap-2">
                ← 返回繪畫
            </button>
            <div class="text-white/40 text-xs">
                目前森林成員: <span id="onlineCount">同步中...</span>
            </div>
        </div>

        <!-- AI 角色資訊卡 -->
        <div id="aiCard" class="absolute bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-sm z-30 bg-white/95 backdrop-blur-md rounded-3xl p-6 shadow-2xl pointer-events-auto">
            <div class="flex items-center gap-4 mb-3">
                <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center text-2xl">🌿</div>
                <div>
                    <h3 id="creatureName" class="text-xl font-bold text-gray-800">角色名稱</h3>
                    <p id="creatureTag" class="text-sm text-green-600 font-medium">性格特徵</p>
                </div>
            </div>
            <p id="creatureQuote" class="text-gray-600 italic leading-relaxed">"這是我說的話..."</p>
            <button onclick="closeCard()" class="mt-4 w-full text-center text-xs text-gray-400 uppercase tracking-widest">點擊空白處關閉</button>
        </div>

        <canvas id="animationCanvas" class="w-full h-full cursor-pointer"></canvas>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, onSnapshot, query, limit } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase 配置
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'shared-forest';

        // 初始化變數
        const page1 = document.getElementById('page1');
        const page2 = document.getElementById('page2');
        const drawCanvas = document.getElementById('drawingCanvas');
        const animCanvas = document.getElementById('animationCanvas');
        const drawCtx = drawCanvas.getContext('2d');
        const animCtx = animCanvas.getContext('2d');
        const aiLoader = document.getElementById('aiLoader');
        const aiCard = document.getElementById('aiCard');
        const apiKey = ""; // 系統注入

        let isDrawing = false;
        let localCreatures = []; // 儲存已加載的圖片對象與數據
        let user = null;

        // 畫筆初始化
        drawCtx.strokeStyle = '#064e3b';
        drawCtx.lineWidth = 6;
        drawCtx.lineCap = 'round';
        drawCtx.lineJoin = 'round';

        // 1. Firebase 身份驗證
        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };
        initAuth();

        onAuthStateChanged(auth, (u) => {
            user = u;
            if (user) {
                setupRealtimeSync();
            }
        });

        // 2. 實時同步功能
        function setupRealtimeSync() {
            // 注意：遵守 RULE 2，使用簡單查詢並在內存處理
            const forestCollection = collection(db, 'artifacts', appId, 'public', 'data', 'creatures');
            
            onSnapshot(forestCollection, (snapshot) => {
                document.getElementById('onlineCount').textContent = snapshot.size;
                
                snapshot.docChanges().forEach((change) => {
                    if (change.type === "added") {
                        const data = change.doc.data();
                        loadCreature(data);
                    }
                });
            }, (error) => {
                console.error("Firestore Error:", error);
            });
        }

        function loadCreature(data) {
            const img = new Image();
            img.onload = () => {
                localCreatures.push({
                    img,
                    name: data.name,
                    personality: data.personality,
                    quote: data.quote,
                    x: Math.random() * (window.innerWidth - 100),
                    y: Math.random() * (window.innerHeight - 100),
                    vx: (Math.random() - 0.5) * 4,
                    vy: (Math.random() - 0.5) * 4,
                    size: 80 + Math.random() * 60,
                    rotation: 0,
                    rv: (Math.random() - 0.5) * 0.04
                });
            };
            img.src = data.imageData;
        }

        // 3. 繪圖邏輯 (與原版相同)
        function startDrawing(e) { isDrawing = true; draw(e); }
        function stopDrawing() { isDrawing = false; drawCtx.beginPath(); }
        function draw(e) {
            if (!isDrawing) return;
            const rect = drawCanvas.getBoundingClientRect();
            const x = (e.clientX || (e.touches ? e.touches[0].clientX : 0)) - rect.left;
            const y = (e.clientY || (e.touches ? e.touches[0].clientY : 0)) - rect.top;
            drawCtx.lineTo(x, y);
            drawCtx.stroke();
            drawCtx.beginPath();
            drawCtx.moveTo(x, y);
        }

        drawCanvas.addEventListener('mousedown', startDrawing);
        drawCanvas.addEventListener('mousemove', draw);
        window.addEventListener('mouseup', stopDrawing);
        drawCanvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDrawing(e); });
        drawCanvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });
        drawCanvas.addEventListener('touchend', stopDrawing);

        document.getElementById('clearBtn').addEventListener('click', () => {
            drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
        });

        // 4. Gemini AI 角色生成
        async function analyzeWithGemini(base64Image) {
            const prompt = "為這張手繪圖設計一個名字、性格特徵（4個字）及口頭禪。回傳 JSON：{\"name\": \"名字\", \"personality\": \"性格\", \"quote\": \"口頭禪\"}。使用繁體中文。";
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/png", data: base64Image.split(',')[1] } }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });
                const data = await response.json();
                return JSON.parse(data.candidates[0].content.parts[0].text);
            } catch (error) {
                return { name: "森林精靈", personality: "神秘優雅", quote: "森林歡迎你。" };
            }
        }

        // 5. 傳送至雲端
        document.getElementById('sendBtn').addEventListener('click', async () => {
            if (!user) return;
            const blank = document.createElement('canvas');
            blank.width = drawCanvas.width; blank.height = drawCanvas.height;
            if (drawCanvas.toDataURL() === blank.toDataURL()) return;

            aiLoader.style.display = 'flex';
            const imageData = drawCanvas.toDataURL();
            const aiData = await analyzeWithGemini(imageData);

            // 儲存到 Firestore 公共集合
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'creatures'), {
                    ...aiData,
                    imageData,
                    createdAt: Date.now(),
                    creator: user.uid
                });
            } catch (e) {
                console.error("Save error:", e);
            }

            aiLoader.style.display = 'none';
            drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
            switchPage(2);
        });

        // 6. UI 控制
        animCanvas.addEventListener('click', (e) => {
            const rect = animCanvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            for (let i = localCreatures.length - 1; i >= 0; i--) {
                const c = localCreatures[i];
                if (x >= c.x && x <= c.x + c.size && y >= c.y && y <= c.y + c.size) {
                    showCard(c);
                    return;
                }
            }
            closeCard();
        });

        function showCard(c) {
            document.getElementById('creatureName').textContent = c.name;
            document.getElementById('creatureTag').textContent = c.personality;
            document.getElementById('creatureQuote').textContent = `"${c.quote}"`;
            aiCard.classList.add('active');
        }

        window.closeCard = () => aiCard.classList.remove('active');

        function switchPage(p) {
            if (p === 1) {
                page1.style.opacity = '1'; page1.style.pointerEvents = 'auto';
                page2.style.opacity = '0'; page2.style.pointerEvents = 'none';
            } else {
                page1.style.opacity = '0'; page1.style.pointerEvents = 'none';
                page2.style.opacity = '1'; page2.style.pointerEvents = 'auto';
                resizeCanvas();
            }
        }

        document.getElementById('viewGallery').addEventListener('click', () => switchPage(2));
        document.getElementById('backBtn').addEventListener('click', () => switchPage(1));

        function resizeCanvas() {
            animCanvas.width = window.innerWidth;
            animCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // 7. 動畫循環
        function animate() {
            animCtx.clearRect(0, 0, animCanvas.width, animCanvas.height);
            localCreatures.forEach(c => {
                c.x += c.vx; c.y += c.vy; c.rotation += c.rv;
                if (c.x <= 0 || c.x + c.size >= animCanvas.width) c.vx *= -1;
                if (c.y <= 0 || c.y + c.size >= animCanvas.height) c.vy *= -1;

                animCtx.save();
                animCtx.translate(c.x + c.size/2, c.y + c.size/2);
                animCtx.rotate(c.rotation);
                animCtx.shadowBlur = 10;
                animCtx.shadowColor = 'rgba(16, 185, 129, 0.3)';
                animCtx.drawImage(c.img, -c.size/2, -c.size/2, c.size, c.size);
                animCtx.restore();
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
