<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>頁面1 - 多人繪圖上傳</title>
    <style>
        body { background-color: #ffffff; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; margin-top: 50px; }
        canvas { border: 2px solid #333; cursor: crosshair; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        button { margin-top: 20px; padding: 10px 20px; font-size: 18px; background-color: #007BFF; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>
    <h2>請在下方畫畫，完成後按「傳送到大螢幕」</h2>
    <canvas id="drawCanvas" width="400" height="400"></canvas>
    <button id="sendBtn">傳送到大螢幕</button>

    <script type="module">
        // 載入 Firebase 核心與資料庫模組 (對應你的 12.11.0 版本)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

        // 你的專屬 Firebase 設定
        const firebaseConfig = {
            apiKey: "AIzaSyCxceo3lq2CNXtYBUQBsoc00NO800o1Xk4",
            authDomain: "project-7577690681598110536.firebaseapp.com",
            databaseURL: "https://project-7577690681598110536-default-rtdb.firebaseio.com",
            projectId: "project-7577690681598110536",
            storageBucket: "project-7577690681598110536.firebasestorage.app",
            messagingSenderId: "239454542830",
            appId: "1:239454542830:web:56f1fb2646d1f8b9eb4cff",
            measurementId: "G-LCFZK9RY8Z"
        };

        // 初始化 Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 畫布邏輯
        const canvas = document.getElementById('drawCanvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;
        
        ctx.fillStyle = "white"; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.lineWidth = 5; 
        ctx.lineCap = 'round'; 
        ctx.strokeStyle = 'black';

        canvas.addEventListener('mousedown', (e) => { isDrawing = true; ctx.beginPath(); ctx.moveTo(e.offsetX, e.offsetY); });
        canvas.addEventListener('mousemove', (e) => { if (isDrawing) { ctx.lineTo(e.offsetX, e.offsetY); ctx.stroke(); } });
        canvas.addEventListener('mouseup', () => { isDrawing = false; });
        canvas.addEventListener('mouseout', () => { isDrawing = false; });

        // 傳送到 Firebase 資料庫
        document.getElementById('sendBtn').addEventListener('click', () => {
            const imageData = canvas.toDataURL('image/png');
            
            // 將圖片資料推送到資料庫的 'drawings' 節點
            push(ref(db, 'drawings'), imageData).then(() => {
                alert("傳送成功！這幅畫已經飛到大螢幕了！");
                // 傳送後清空畫布
                ctx.fillStyle = "white";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }).catch((error) => {
                alert("傳送失敗：" + error);
            });
        });
    </script>
</body>
</html>
