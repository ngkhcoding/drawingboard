<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>✨ AI 塗鴉動物園 ✨</title>
    <!-- 引入 Tailwind CSS 進行現代化排版 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Google Fonts (Nunito) 增加可愛圓潤感 -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; overscroll-behavior: none; }
        
        /* 隱藏捲軸但保持可捲動 */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        
        /* 繪圖畫布的專屬樣式 */
        canvas { touch-action: none; }
        
        /* 毛玻璃特效 */
        .glass-panel {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* 漸層文字特效 */
        .text-gradient {
            background: linear-gradient(135deg, #6366f1, #d946ef, #f43f5e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 動態漂浮圖片 */
        .moving-entity {
            position: absolute;
            width: 140px;
            height: 140px;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.3s;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.15));
            z-index: 5;
        }
        .moving-entity:hover {
            transform: scale(1.15) rotate(-5deg);
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.3));
            z-index: 10;
        }

        /* 讀取中動畫 */
        .magic-spinner {
            width: 60px; height: 60px;
            border: 6px solid rgba(255,255,255,0.3);
            border-top-color: #fff; border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 彈出視窗動畫 */
        .animate-pop {
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.8) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* 新加入圖案的聚光燈特效 */
        .spotlight-entity {
            transform: scale(2.2) !important;
            z-index: 100 !important;
            filter: drop-shadow(0 0 30px rgba(255,255,255,0.9)) drop-shadow(0 15px 25px rgba(0,0,0,0.3)) !important;
            transition: transform 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 1.5s !important;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 h-screen w-screen overflow-hidden flex flex-col relative">

    <!-- 🌟 全域導覽列 (模式切換) -->
    <nav class="absolute top-4 left-1/2 transform -translate-x-1/2 z-50 glass-panel rounded-full shadow-lg p-1.5 flex gap-1 w-[90%] max-w-sm">
        <button id="navDrawBtn" class="flex-1 py-2 px-4 rounded-full text-sm font-bold transition-all bg-white shadow-sm text-indigo-600">
            🎨 繪圖模式
        </button>
        <button id="navZooBtn" class="flex-1 py-2 px-4 rounded-full text-sm font-bold transition-all text-slate-500 hover:text-slate-800">
            🏞️ 動物園大廳
        </button>
    </nav>

    <!-- ==========================================
         VIEW 1: 🎨 繪圖工作室
         ========================================== -->
    <main id="viewDraw" class="absolute inset-0 flex flex-col items-center justify-center p-4 bg-gradient-to-br from-indigo-50 via-purple-50 to-pink-50 h-full w-full overflow-y-auto pt-24 pb-10 transition-opacity duration-300">
        
        <div class="glass-panel w-full max-w-md rounded-3xl shadow-2xl p-6 flex flex-col items-center">
            <h1 class="text-3xl font-black mb-2 text-gradient">創造新生命</h1>
            <p class="text-slate-500 text-sm mb-6 font-semibold">畫出你的專屬怪物，AI 將賦予牠靈魂！</p>
            
            <!-- 畫布容器 -->
            <div class="w-full aspect-square bg-white rounded-2xl shadow-inner border-4 border-indigo-100 overflow-hidden relative mb-6">
                <canvas id="drawCanvas" width="400" height="400" class="w-full h-full cursor-crosshair"></canvas>
            </div>
            
            <!-- 顏色選擇器 -->
            <div class="flex gap-3 w-full mb-4 justify-center" id="colorPalette">
                <!-- 預設黑色 -->
                <button class="w-10 h-10 rounded-full border-[3px] border-white ring-2 ring-indigo-500 shadow-md transition-transform hover:scale-110" style="background-color: #1e293b;" data-color="#1e293b"></button>
                <!-- 紅色 -->
                <button class="w-10 h-10 rounded-full border-[3px] border-white ring-0 ring-transparent shadow-md transition-transform hover:scale-110" style="background-color: #ef4444;" data-color="#ef4444"></button>
                <!-- 藍色 -->

                <!-- 綠色 -->

                <!-- 橘黃色 -->

            </div>

            <!-- 工具按鈕 -->
            <div class="flex gap-3 w-full mb-4">

            <!-- AI 角色分析說明 -->
            <div class="w-full bg-indigo-50 border border-indigo-100 rounded-xl p-4 mb-4 text-left shadow-sm">
                <h3 class="text-indigo-800 font-bold text-sm mb-1 flex items-center gap-1">
                    <span>✨</span> AI 角色分析

                <p class="text-indigo-600/80 text-xs leading-relaxed font-semibold">
                    當您按下「傳送」時，系統會將畫作發送給 AI 辨識您的塗鴉，並為它命名、賦予性格，甚至寫下一句專屬對話。

            <!-- 傳送按鈕 (漸層大按鈕) -->

                ✨ 賦予靈魂並傳送 ✨
            </button>
        </div>
    </main>

    <!-- ==========================================
         VIEW 2: 🏞️ AI 動物園大廳
         ========================================== -->
    <main id="viewZoo" class="absolute inset-0 bg-gradient-to-br from-emerald-100 via-teal-50 to-cyan-100 hidden h-full w-full overflow-hidden transition-opacity duration-300">
        <!-- 裝飾背景文字 -->
        <div class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-[0.03]">
            <h1 class="text-[10rem] font-black tracking-tighter">ZOO</h1>
        </div>

    <!-- ==========================================

         ========================================== -->
    
    <!-- ✨ 處理中遮罩 -->
    <div id="processingOverlay" class="fixed inset-0 bg-indigo-900/80 backdrop-blur-md z-[100] hidden flex-col items-center justify-center text-white transition-opacity">
        <div class="magic-spinner mb-6"></div>
        <h2 id="aiStatusTitle" class="text-2xl font-black mb-2 text-center animate-pulse">正在連結靈魂網路...</h2>
        <p id="aiStatusDesc" class="text-indigo-200 text-center max-w-xs font-semibold">AI 正在仔細觀察你的塗鴉</p>
    </div>

    <!-- ✨ 角色名片彈窗 (Trading Card Style) -->
    <div id="modalOverlay" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[200] hidden items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[2rem] shadow-2xl relative overflow-hidden animate-pop">
            
            <!-- 卡片頂部裝飾背景 -->
            <div class="h-32 bg-gradient-to-br from-indigo-400 to-purple-500 absolute top-0 w-full"></div>
            
            <!-- 關閉按鈕 -->
            <button id="closeModalBtn" class="absolute top-4 right-4 bg-white/20 hover:bg-white/40 backdrop-blur text-white w-8 h-8 rounded-full flex items-center justify-center transition-colors z-10">
                ✕
            </button>

            <div class="relative pt-16 px-6 pb-8 flex flex-col items-center">
                <!-- 頭像框 -->
                <div class="w-32 h-32 bg-white rounded-3xl shadow-xl p-2 mb-4 relative z-10 transform rotate-3">
                    <div class="w-full h-full rounded-2xl border-2 border-dashed border-slate-200 flex items-center justify-center bg-slate-50 overflow-hidden">
                        <img src="" id="modalImg" class="w-[120%] h-[120%] object-contain" alt="Character">
                    </div>
                </div>

                <!-- AI 生成資訊 -->
                <div class="text-center w-full">
                    <div class="inline-block px-3 py-1 bg-purple-100 text-purple-700 text-xs font-black rounded-full mb-2 tracking-wide uppercase">
                        AI 創造的新物種
                    </div>
                    <h2 id="modalName" class="text-3xl font-black text-slate-800 mb-2">角色名字</h2>
                    
                    <div class="bg-slate-50 rounded-2xl p-4 mb-4 mt-2 border border-slate-100">
                        <p id="modalPersonality" class="text-slate-600 font-semibold text-sm leading-relaxed">
                            性格描述
                        </p>
                    </div>

                    <div class="relative">
                        <span class="text-4xl text-indigo-200 absolute -top-4 -left-2 font-serif">"</span>
                        <p id="modalQuote" class="text-lg font-bold text-indigo-600 italic px-6 relative z-10">
                            經典台詞經典台詞經典台詞
                        </p>
                        <span class="text-4xl text-indigo-200 absolute -bottom-8 -right-2 font-serif">"</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ==========================================
         JavaScript 邏輯
         ========================================== -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, remove, onChildRemoved } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

        // ==========================================
        // 1. 環境變數與初始化
        // ==========================================
        
        // Firebase 設定 (使用你的專案)
        const firebaseConfig = {
            apiKey: "AIzaSyCxceo3lq2CNXtYBUQBsoc00NO800o1Xk4",
            authDomain: "project-7577690681598110536.firebaseapp.com",
            databaseURL: "https://project-7577690681598110536-default-rtdb.firebaseio.com",
            projectId: "project-7577690681598110536",
            storageBucket: "project-7577690681598110536.firebasestorage.app",
            messagingSenderId: "239454542830",
            appId: "1:239454542830:web:56f1fb2646d1f8b9eb4cff",
            measurementId: "G-LCFZK9RY8Z"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const drawingsRef = ref(db, 'drawings');

        // ⚠️ 請在此填入你的智譜 AI API Key
        const apiKey = "e2bf1f2b563e43789f2ef97c3fc51f65.R0QpxNoSojQSMVGT"; 
        const GLM_API_URL = "https://open.bigmodel.cn/api/paas/v4/chat/completions";

        // 全域狀態
        let currentMode = 'draw'; // 'draw' 或 'zoo'
        const zooRegistry = {}; 
        let artworks = []; 
        let isZooPaused = false;
        const pageLoadTime = Date.now(); // 紀錄頁面載入時間，用來判斷是否為「新加入」的圖案

        // ==========================================
        // 2. UI 導覽切換邏輯
        // ==========================================
        const viewDraw = document.getElementById('viewDraw');
        const viewZoo = document.getElementById('viewZoo');
        const navDrawBtn = document.getElementById('navDrawBtn');
        const navZooBtn = document.getElementById('navZooBtn');

        function switchMode(mode) {
            currentMode = mode;
            if (mode === 'draw') {
                viewDraw.classList.remove('hidden'); viewZoo.classList.add('hidden');
                // 按鈕樣式 (啟用狀態)
                navDrawBtn.className = "flex-1 py-2 px-4 rounded-full text-sm font-bold transition-all bg-white shadow-sm text-indigo-600";
                navZooBtn.className = "flex-1 py-2 px-4 rounded-full text-sm font-bold transition-all text-slate-500 hover:text-slate-800";
            } else {
                viewZoo.classList.remove('hidden'); viewDraw.classList.add('hidden');
                // 按鈕樣式 (啟用狀態)
                navZooBtn.className = "flex-1 py-2 px-4 rounded-full text-sm font-bold transition-all bg-white shadow-sm text-teal-600";
                navDrawBtn.className = "flex-1 py-2 px-4 rounded-full text-sm font-bold transition-all text-slate-500 hover:text-slate-800";
            }
        }

        navDrawBtn.addEventListener('click', () => switchMode('draw'));
        navZooBtn.addEventListener('click', () => switchMode('zoo'));

        // ==========================================
        // 3. 繪圖板邏輯 (Canvas)
        // ==========================================
        const canvas = document.getElementById('drawCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        
        let isDrawing = false;
        let historyPushStack = [];
        
        ctx.lineWidth = 8; 
        ctx.lineCap = 'round'; 
        ctx.lineJoin = 'round';
        ctx.strokeStyle = '#1e293b'; // 深岩灰色，預設顏色

        // 顏色選擇邏輯
        const colorBtns = document.querySelectorAll('#colorPalette button');
        colorBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                // 清除所有按鈕的選取狀態
                colorBtns.forEach(b => { 
                    b.classList.remove('ring-2', 'ring-indigo-500'); 
                    b.classList.add('ring-transparent'); 
                });
                // 設定目前選取的按鈕
                const target = e.currentTarget;
                target.classList.remove('ring-transparent');
                target.classList.add('ring-2', 'ring-indigo-500');
                // 更改畫筆顏色
                ctx.strokeStyle = target.dataset.color;
            });
        });

        function saveHistory() {
            historyPushStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
            if (historyPushStack.length > 30) historyPushStack.shift();
        }
        
        // 初始透明狀態
        saveHistory(); 

        function getCanvasCoordinates(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX, clientY;
            if (e.touches && e.touches[0]) {
                clientX = e.touches[0].clientX; clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX; clientY = e.clientY;
            }
            return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
        }

        function startDrawing(e) {
            isDrawing = true;
            const coords = getCanvasCoordinates(e);
            ctx.beginPath(); ctx.moveTo(coords.x, coords.y); ctx.lineTo(coords.x, coords.y); ctx.stroke();
            if(e.cancelable && e.type.startsWith('touch')) e.preventDefault();
        }

        function drawMoving(e) {
            if (!isDrawing) return;
            const coords = getCanvasCoordinates(e);
            ctx.lineTo(coords.x, coords.y); ctx.stroke();
            if(e.cancelable && e.type.startsWith('touch')) e.preventDefault();
        }

        function stopDrawing(e) {
            if (isDrawing) { isDrawing = false; ctx.closePath(); saveHistory(); }
        }

        canvas.addEventListener('mousedown', startDrawing);
        window.addEventListener('mousemove', drawMoving);
        window.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('touchstart', startDrawing, { passive: false });
        canvas.addEventListener('touchmove', drawMoving, { passive: false });
        window.addEventListener('touchend', stopDrawing);
        window.addEventListener('touchcancel', stopDrawing);

        // 復原與重置
        document.getElementById('undoBtn').addEventListener('click', () => {
            if (historyPushStack.length > 1) {
                historyPushStack.pop(); 
                ctx.putImageData(historyPushStack[historyPushStack.length - 1], 0, 0);
            }
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            historyPushStack = []; saveHistory();
        });

        // ==========================================
        // 4. Gemini AI 核心邏輯
        // ==========================================
        const overlay = document.getElementById('processingOverlay');
        const statusTitle = document.getElementById('aiStatusTitle');
        const statusDesc = document.getElementById('aiStatusDesc');

        function setOverlayStatus(title, desc, isLoading = true) {
            statusTitle.innerText = title;
            statusDesc.innerText = desc;
            document.querySelector('.magic-spinner').style.display = isLoading ? 'block' : 'none';
        }

        async function analyzeImageWithAI(base64Image) {
            // GLM 需要完整的 base64 URL (包含 data:image/png;base64, 前綴)
            const payload = {
                model: "glm-4.6v", // 切換為更強大的 glm-4.6v 視覺模型
                messages: [
                    {
                        role: "user",
                        content: [
                            {
                                type: "text",
                                text: "這是一張簡單的線條塗鴉。請發揮創意辨識它像什麼，並為這個角色賦予靈魂。回傳純 JSON 格式，必須包含以下 key：'name'(有趣繁體中文名), 'personality'(一句話形容性格), 'quote'(專屬經典台詞)。不要有 Markdown 標記。"
                            },
                            {
                                type: "image_url",
                                image_url: {
                                    url: base64Image
                                }
                            }
                        ]
                    }
                ]
            };

            setOverlayStatus("AI 正在觀察...", "思考這優美的線條代表什麼生命體");

            // 實作自動重試機制 (Exponential Backoff) 以提高穩定性
            let retries = 5;
            let delay = 1000;
            
            while (retries > 0) {
                try {
                    const response = await fetch(GLM_API_URL, {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${apiKey}` // 智譜 API 使用 Bearer Token 驗證
                        },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    
                    const data = await response.json();
                    
                    // GLM 的回應格式提取
                    let aiTextResponse = data.choices?.[0]?.message?.content;
                    if(!aiTextResponse) throw new Error("AI 回應格式錯誤");

                    // 嘗試清理可能存在的 Markdown JSON 標記
                    aiTextResponse = aiTextResponse.replace(/```json/g, '').replace(/```/g, '').trim();
                    
                    setOverlayStatus("靈魂合成中！", "正在準備角色的專屬名片...");
                    return JSON.parse(aiTextResponse);

                } catch (error) {
                    console.error("API Call Failed. Retries left:", retries - 1, error);
                    retries--;
                    if (retries === 0) throw error;
                    await new Promise(resolve => setTimeout(resolve, delay));
                    delay *= 2;
                }
            }
        }

        document.getElementById('sendBtn').addEventListener('click', async () => {
            if(historyPushStack.length <= 1) { alert("請先在畫布上創作喔！"); return; }

            overlay.style.display = 'flex';
            setTimeout(()=> overlay.classList.remove('opacity-0'), 10);
            setOverlayStatus("正在連結網路...", "啟動 AI 賦靈儀式");

            try {
                // 為圖片加上白色背景再轉出，因為 AI 看透明背景可能會出現黑邊問題
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = canvas.width; tempCanvas.height = canvas.height;
                const tempCtx = tempCanvas.getContext('2d');
                tempCtx.fillStyle = 'white'; tempCtx.fillRect(0,0,tempCanvas.width,tempCanvas.height);
                tempCtx.drawImage(canvas, 0, 0);
                const imageData = tempCanvas.toDataURL('image/png');

                const aiSoul = await analyzeImageWithAI(imageData);
                
                const finalPayload = {
                    image: imageData, 
                    aiName: aiSoul.name || "神祕生物", 
                    aiPersonality: aiSoul.personality || "未知", 
                    aiQuote: aiSoul.quote || "...", 
                    timestamp: Date.now()
                };

                setOverlayStatus("創造成功！", `你的「${finalPayload.aiName}」已經誕生！`, false);

                await push(drawingsRef, finalPayload);

                setTimeout(() => {
                    overlay.style.display = 'none';
                    document.getElementById('resetBtn').click();
                    // 創造成功後，自動切換到動物園模式看看牠！
                    switchMode('zoo');
                }, 2000);

            } catch (error) {
                console.error(error);
                setOverlayStatus("儀式失敗", "API 連結出錯，請稍後重試 😢", false);
                setTimeout(() => { overlay.style.display = 'none'; }, 3000);
            }
        });

        // ==========================================
        // 5. 動物園大廳邏輯 (展示與互動)
        // ==========================================
        const zooContainer = document.getElementById('zooContainer');

        function removeWhiteBackground(base64Image, callback) {
            const tempImg = new Image(); tempImg.src = base64Image;
            tempImg.onload = () => {
                const tCanvas = document.createElement('canvas'); tCanvas.width = tempImg.width; tCanvas.height = tempImg.height;
                const tCtx = tCanvas.getContext('2d', { willReadFrequently: true }); 
                tCtx.drawImage(tempImg, 0, 0);
                const imgData = tCtx.getImageData(0, 0, tCanvas.width, tCanvas.height); 
                const data = imgData.data;
                for (let i = 0; i < data.length; i += 4) { 
                    // 去除相近白色
                    if (data[i] > 230 && data[i+1] > 230 && data[i+2] > 230) { data[i+3] = 0; } 
                }
                tCtx.putImageData(imgData, 0, 0); 
                callback(tCanvas.toDataURL('image/png'));
            };
        }

        // 名片 UI 變數
        const modalOverlay = document.getElementById('modalOverlay');
        const modalImg = document.getElementById('modalImg');
        const modalName = document.getElementById('modalName');
        const modalPersonality = document.getElementById('modalPersonality');
        const modalQuote = document.getElementById('modalQuote');

        function closeCharacterCard() { 
            modalOverlay.style.display = 'none'; 
            isZooPaused = false; 
        }
        
        document.getElementById('closeModalBtn').addEventListener('click', closeCharacterCard);
        modalOverlay.addEventListener('click', (e) => { if(e.target === modalOverlay) closeCharacterCard(); });

        function openCharacterCard(key, transparentImage) {
            const character = zooRegistry[key];
            if(!character) return;
            isZooPaused = true; // 暫停動畫
            
            modalImg.src = transparentImage;
            modalName.innerText = character.aiName;
            modalPersonality.innerText = character.aiPersonality;
            modalQuote.innerText = character.aiQuote;
            
            modalOverlay.style.display = 'flex';
        }

        // Firebase 監聽新增
        onChildAdded(drawingsRef, (snapshot) => {
            const data = snapshot.val();
            const firebaseKey = snapshot.key;
            zooRegistry[firebaseKey] = data;

            removeWhiteBackground(data.image, (transparentImageData) => {
                const imgEl = document.createElement('img');
                imgEl.src = transparentImageData;
                imgEl.className = 'moving-entity';
                imgEl.id = 'img_' + firebaseKey;
                
                imgEl.addEventListener('click', () => {
                    openCharacterCard(firebaseKey, transparentImageData);
                });
                
                zooContainer.appendChild(imgEl);

                // 判斷是否為新加入的圖案
                const isNewItem = data.timestamp > pageLoadTime;
                let startX, startY, isResting = false;

                if (isNewItem) {
                    // 新加入的圖案：放在正中間並放大
                    startX = (window.innerWidth / 2) - 70;
                    startY = (window.innerHeight / 2) - 70;
                    isResting = true;
                    imgEl.classList.add('spotlight-entity');
                    
                    // 8 秒後解除放大狀態並開始漂浮
                    setTimeout(() => {
                        const artIndex = artworks.findIndex(a => a.key === firebaseKey);
                        if(artIndex !== -1) {
                            artworks[artIndex].isResting = false;
                            imgEl.classList.remove('spotlight-entity');
                        }
                    }, 8000);
                } else {
                    // 原本就存在的圖案：一開始就賦予隨機位置
                    startX = Math.random() * (window.innerWidth - 180) + 20;
                    startY = Math.random() * (window.innerHeight - 180) + 20;
                }

                // 賦予柔和的飄浮速度
                const artData = {
                    key: firebaseKey,
                    element: imgEl,
                    x: startX,
                    y: startY,
                    dx: (Math.random() * 0.8 + 0.2) * (Math.random() > 0.5 ? 1 : -1),
                    dy: (Math.random() * 0.8 + 0.2) * (Math.random() > 0.5 ? 1 : -1),
                    isResting: isResting
                };
                artworks.push(artData);
            });
        });

        // Firebase 監聽刪除
        onChildRemoved(drawingsRef, (snapshot) => {
            const firebaseKey = snapshot.key;
            const imgEl = document.getElementById('img_' + firebaseKey);
            if(imgEl) {
                // 加入淡出動畫再移除
                imgEl.style.opacity = '0';
                imgEl.style.transform = 'scale(0)';
                setTimeout(() => imgEl.remove(), 300);
            }
            artworks = artworks.filter(art => art.key !== firebaseKey);
            delete zooRegistry[firebaseKey];
            if(modalOverlay.style.display === 'flex') closeCharacterCard();
        });

        // 核心動畫迴圈
        function animateZoo() {
            if (!isZooPaused && currentMode === 'zoo') {
                const w = window.innerWidth;
                const h = window.innerHeight;
                artworks.forEach((art) => {
                    if (art.isResting) {
                        // 如果在聚光燈休息狀態，強制保持在畫面正中間（即使視窗縮放）
                        art.x = (window.innerWidth / 2) - 70;
                        art.y = (window.innerHeight / 2) - 70;
                        art.element.style.left = art.x + 'px'; 
                        art.element.style.top = art.y + 'px';
                        return; // 提早返回，跳過漂浮更新
                    }

                    if (art.x + 140 >= w || art.x <= 0) art.dx = -art.dx;
                    if (art.y + 140 >= h || art.y <= 0) art.dy = -art.dy;
                    art.x += art.dx; art.y += art.dy;
                    art.element.style.left = art.x + 'px'; 
                    art.element.style.top = art.y + 'px';
                });
            }
            requestAnimationFrame(animateZoo);
        }
        animateZoo();

        // 全域清空
        document.getElementById('globalResetBtn').addEventListener('click', () => {
            if(Object.keys(zooRegistry).length === 0) { alert("大廳目前已經是空的了喔！"); return; }
            if(confirm("確定要將所有生命體放生，清空動物園嗎？")) { 
                remove(drawingsRef); 
            }
        });

    </script>
</body>
</html>
