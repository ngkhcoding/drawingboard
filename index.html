<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 互動繪圖傳送門</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            touch-action: none;
            overflow: hidden;
            background-color: #f8fafc;
        }
        .canvas-container {
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-radius: 1.5rem;
            background: white;
            position: relative;
        }
        #drawingCanvas {
            cursor: crosshair;
            touch-action: none;
        }
        .ai-loading {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.8);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 1.5rem;
            z-index: 20;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #aiCard {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: translateY(120%);
        }
        #aiCard.active {
            transform: translateY(0);
        }
    </style>
</head>
<body class="h-screen flex flex-col font-sans">

    <!-- 頁面 1: 繪圖區 -->
    <div id="page1" class="absolute inset-0 z-10 bg-white flex flex-col items-center justify-center p-4 transition-opacity duration-500">
        <div class="text-center mb-6">
            <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-purple-600">
                AI 靈魂畫手
            </h1>
            <p class="text-gray-500 mt-2">繪製你的角色，讓 Gemini AI 賦予它生命</p>
        </div>
        
        <div class="canvas-container border-4 border-blue-50">
            <div id="aiLoader" class="ai-loading">
                <div class="spinner mb-4"></div>
                <p class="text-blue-600 font-bold">Gemini 正在辨識畫作...</p>
            </div>
            <canvas id="drawingCanvas" width="400" height="400"></canvas>
        </div>

        <div class="mt-8 flex gap-4">
            <button id="clearBtn" class="px-6 py-3 bg-gray-100 text-gray-600 rounded-2xl hover:bg-gray-200 transition font-semibold">
                清空畫板
            </button>
            <button id="sendBtn" class="px-10 py-3 bg-blue-600 text-white rounded-2xl hover:bg-blue-700 transition shadow-xl font-bold flex items-center gap-2">
                <span>賦予靈魂並傳送</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" />
                </svg>
            </button>
        </div>
        
        <button id="viewGallery" class="mt-8 text-blue-400 hover:text-blue-600 text-sm font-medium">查看展示區 →</button>
    </div>

    <!-- 頁面 2: 動畫展示區 -->
    <div id="page2" class="absolute inset-0 z-0 bg-slate-950 opacity-0 pointer-events-none transition-opacity duration-700">
        <div class="absolute top-6 left-6 z-30 pointer-events-auto">
            <button id="backBtn" class="px-4 py-2 bg-white/10 hover:bg-white/20 text-white border border-white/20 rounded-xl backdrop-blur-md flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                返回創作
            </button>
        </div>

        <!-- AI 角色資訊卡 -->
        <div id="aiCard" class="absolute bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-sm z-30 bg-white rounded-3xl p-6 shadow-2xl pointer-events-auto">
            <div class="flex items-center gap-4 mb-3">
                <div id="cardIcon" class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center text-2xl">👾</div>
                <div>
                    <h3 id="creatureName" class="text-xl font-bold text-gray-800">角色名稱</h3>
                    <p id="creatureTag" class="text-sm text-blue-500 font-medium">性格特徵</p>
                </div>
            </div>
            <p id="creatureQuote" class="text-gray-600 italic leading-relaxed">"這是我說的話..."</p>
            <button onclick="closeCard()" class="mt-4 w-full text-center text-xs text-gray-400 uppercase tracking-widest">點擊空白處關閉</button>
        </div>

        <canvas id="animationCanvas" class="w-full h-full cursor-pointer"></canvas>
    </div>

    <script>
        const apiKey = ""; // 系統自動注入
        const page1 = document.getElementById('page1');
        const page2 = document.getElementById('page2');
        const drawCanvas = document.getElementById('drawingCanvas');
        const animCanvas = document.getElementById('animationCanvas');
        const drawCtx = drawCanvas.getContext('2d');
        const animCtx = animCanvas.getContext('2d');
        const aiLoader = document.getElementById('aiLoader');
        const aiCard = document.getElementById('aiCard');

        let isDrawing = false;
        let creatures = [];

        // 畫筆初始化
        drawCtx.strokeStyle = '#1e293b';
        drawCtx.lineWidth = 6;
        drawCtx.lineCap = 'round';
        drawCtx.lineJoin = 'round';

        // 繪圖事件
        function startDrawing(e) {
            isDrawing = true;
            draw(e);
        }
        function stopDrawing() {
            isDrawing = false;
            drawCtx.beginPath();
        }
        function draw(e) {
            if (!isDrawing) return;
            const rect = drawCanvas.getBoundingClientRect();
            const x = (e.clientX || (e.touches ? e.touches[0].clientX : 0)) - rect.left;
            const y = (e.clientY || (e.touches ? e.touches[0].clientY : 0)) - rect.top;
            drawCtx.lineTo(x, y);
            drawCtx.stroke();
            drawCtx.beginPath();
            drawCtx.moveTo(x, y);
        }

        drawCanvas.addEventListener('mousedown', startDrawing);
        drawCanvas.addEventListener('mousemove', draw);
        window.addEventListener('mouseup', stopDrawing);
        drawCanvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDrawing(e); });
        drawCanvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });
        drawCanvas.addEventListener('touchend', stopDrawing);

        document.getElementById('clearBtn').addEventListener('click', () => {
            drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
        });

        // 調用 Gemini API
        async function analyzeWithGemini(base64Image) {
            const prompt = "你是一個創意角色設計師。請看這張手繪圖，為它設計一個名字、性格特徵（4個字）以及一句它的口頭禪。請只以 JSON 格式回傳，格式如：{\"name\": \"名字\", \"personality\": \"性格\", \"quote\": \"口頭禪\"}。使用繁體中文。";
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: prompt },
                                { inlineData: { mimeType: "image/png", data: base64Image.split(',')[1] } }
                            ]
                        }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });
                const data = await response.json();
                return JSON.parse(data.candidates[0].content.parts[0].text);
            } catch (error) {
                console.error("Gemini Error:", error);
                return { name: "無名小萌物", personality: "活潑好動", quote: "嘿！我來了！" };
            }
        }

        // 傳送邏輯
        document.getElementById('sendBtn').addEventListener('click', async () => {
            const blank = document.createElement('canvas');
            blank.width = drawCanvas.width; blank.height = drawCanvas.height;
            if (drawCanvas.toDataURL() === blank.toDataURL()) return;

            aiLoader.style.display = 'flex';
            const imageData = drawCanvas.toDataURL();
            
            // AI 處理
            const aiData = await analyzeWithGemini(imageData);

            const img = new Image();
            img.src = imageData;
            
            const size = 80 + Math.random() * 60;
            creatures.push({
                img,
                ...aiData,
                x: Math.random() * (window.innerWidth - size),
                y: Math.random() * (window.innerHeight - size),
                vx: (Math.random() - 0.5) * 5,
                vy: (Math.random() - 0.5) * 5,
                size,
                rotation: 0,
                rv: (Math.random() - 0.5) * 0.04
            });

            setTimeout(() => {
                aiLoader.style.display = 'none';
                drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
                switchPage(2);
            }, 500);
        });

        // 點擊 Canvas 檢視角色
        animCanvas.addEventListener('click', (e) => {
            const rect = animCanvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            // 從最後加入的開始檢查 (最上層)
            for (let i = creatures.length - 1; i >= 0; i--) {
                const c = creatures[i];
                if (x >= c.x && x <= c.x + c.size && y >= c.y && y <= c.y + c.size) {
                    showCard(c);
                    return;
                }
            }
            closeCard();
        });

        function showCard(c) {
            document.getElementById('creatureName').textContent = c.name;
            document.getElementById('creatureTag').textContent = c.personality;
            document.getElementById('creatureQuote').textContent = `"${c.quote}"`;
            aiCard.classList.add('active');
        }

        window.closeCard = () => aiCard.classList.remove('active');

        function switchPage(p) {
            if (p === 1) {
                page1.style.opacity = '1'; page1.style.pointerEvents = 'auto';
                page2.style.opacity = '0'; page2.style.pointerEvents = 'none';
                closeCard();
            } else {
                page1.style.opacity = '0'; page1.style.pointerEvents = 'none';
                page2.style.opacity = '1'; page2.style.pointerEvents = 'auto';
                resizeCanvas();
            }
        }

        document.getElementById('viewGallery').addEventListener('click', () => switchPage(2));
        document.getElementById('backBtn').addEventListener('click', () => switchPage(1));

        function resizeCanvas() {
            animCanvas.width = window.innerWidth;
            animCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function animate() {
            animCtx.clearRect(0, 0, animCanvas.width, animCanvas.height);
            
            creatures.forEach(c => {
                c.x += c.vx;
                c.y += c.vy;
                c.rotation += c.rv;

                if (c.x <= 0 || c.x + c.size >= animCanvas.width) c.vx *= -1;
                if (c.y <= 0 || c.y + c.size >= animCanvas.height) c.vy *= -1;

                animCtx.save();
                animCtx.translate(c.x + c.size/2, c.y + c.size/2);
                animCtx.rotate(c.rotation);
                
                // 畫一個發光的底框
                animCtx.shadowBlur = 15;
                animCtx.shadowColor = 'rgba(59, 130, 246, 0.5)';
                
                animCtx.drawImage(c.img, -c.size/2, -c.size/2, c.size, c.size);
                animCtx.restore();
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
